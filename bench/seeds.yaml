# coke-zero benchmark seeds.
#
# 11 hand-authored scenarios with ground-truth labels for the engine to
# score itself against. Procedural variants under bench/scenarios/ are
# generated by bench.generate; each variant inherits its seed's labels
# unless the perturbation explicitly swaps the actor.
#
# expected_actor: head of the Attribution.actor string (e.g., "China",
#   "Iran", "Russia", "Multi-actor", "Unknown"). Match is case-insensitive
#   and compares the first slash-separated segment.
# expected_action: Decision.action string. "any" allows any non-threat-
#   warning action.
# expected_authority: Decision.authority — "local" or "request".
# confidence_band: low (<0.50), med (0.50..0.74), high (>=0.75).
seeds:
  - file: beat1.jsonl
    expected_actor: Unknown
    expected_action: any
    expected_authority: local
    confidence_band: low
    notes: Pre-conflict orbital setup + osint cue; no attribution should fire.

  - file: beat2.jsonl
    expected_actor: Russia
    expected_action: any
    expected_authority: any
    confidence_band: med
    notes: RF interference + cyber probe + PNT spoof; consistent with Russia EW.

  - file: beat4.jsonl
    expected_actor: Russia
    expected_action: any
    expected_authority: any
    confidence_band: med
    notes: PNT alignment cue + commander update; pattern associated with Russia.

  - file: beat47.jsonl
    expected_actor: China
    expected_action: active_defense_escort
    expected_authority: request
    confidence_band: med
    notes: Orbital RPO close approach; PRC inspector profile.

  - file: army_drone_fdir.jsonl
    expected_actor: Russia
    expected_action: any
    expected_authority: any
    confidence_band: med
    notes: Drone GPS spoof + FDIR; Russian EW signature.

  - file: army_multidomain_attack_chain.jsonl
    expected_actor: China
    expected_action: active_defense_escort
    expected_authority: request
    confidence_band: med
    notes: Multi-domain campaign with RPO; PRC dominant.

  - file: army_relay_reconfig.jsonl
    expected_actor: Unknown
    expected_action: any
    expected_authority: any
    confidence_band: low
    notes: Defensive relay reconfiguration; defensive orchestrator action.

  - file: army_satellite_collection_risk.jsonl
    expected_actor: Russia
    expected_action: any
    expected_authority: any
    confidence_band: med
    notes: Overhead collection window + RF posture risk; Russia/PLA SSF pattern.

  - file: iran_counter_c5isr_brigade.jsonl
    expected_actor: Iran
    expected_action: any
    expected_authority: any
    confidence_band: med
    notes: Iran counter-C5ISR with RPO + GPS spoof + cyber probe.

  - file: iran_hormuz_convoy_resilience.jsonl
    expected_actor: Iran
    expected_action: any
    expected_authority: any
    confidence_band: med
    notes: Iran maritime denial campaign.

  - file: iran_proxy_uas_base_defense.jsonl
    expected_actor: Iran
    expected_action: any
    expected_authority: any
    confidence_band: med
    notes: Iran proxy UAS + cyber probes against base defense.

# Procedural-variant generation envelope. Bench.generate perturbs miss
# distances, confidences, and TCAs within these bounds. Each variant
# inherits the labels of its parent seed unless explicitly swapped.
generation:
  variants_per_seed: 4
  miss_distance_jitter_km: 6.0
  range_km_jitter: 3.0
  confidence_jitter: 0.1
  tca_jitter_minutes: 30
