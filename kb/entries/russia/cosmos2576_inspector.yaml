doctrine: >
  Inspector-class payload publicly reported in 2024 deployed into a coplanar
  orbit with a US national security satellite. Pattern is consistent with the
  Cosmos 2519 / 2521 / 2542 lineage of "nesting doll" inspectors and with the
  Russian preference for shadowing maneuvers over kinetic engagement.
