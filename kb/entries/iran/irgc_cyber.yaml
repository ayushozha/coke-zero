id: ir_irgc_cyber
actor: Iran
unit: IRGC / MOIS-aligned threat groups
system: Iranian cyber operations against ground segment
domain: cyber
signature:
  pattern: opportunistic_exploitation_then_destructive_followup
  ttps:
    - vpn_appliance_exploitation
    - credential_spraying
    - selective_wiper_deployment
  ground_station_targeting: emerging
doctrine: >
  Iranian state-aligned threat groups conduct opportunistic exploitation of
